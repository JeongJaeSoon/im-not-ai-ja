name: skill-eval

on:
  workflow_dispatch:
    inputs:
      model:
        description: Claude model used to execute the skill
        required: true
        default: claude-sonnet-5
        type: choice
        options:
          - claude-sonnet-5
          - claude-sonnet-4-6
          - claude-opus-4-8
  pull_request:
    paths:
      - ".agents/plugins/**"
      - ".claude-plugin/**"
      - ".codex-plugin/**"
      - "skills/humanize-japanese/**"
      - "INSTALL.md"
      - "README.md"
      - "evals/**"
      - "tests/**"
      - "scripts/validate_repo.py"
      - ".github/workflows/skill-eval.yml"
  push:
    branches: [main]
    paths:
      - ".agents/plugins/**"
      - ".claude-plugin/**"
      - ".codex-plugin/**"
      - "skills/humanize-japanese/**"
      - "INSTALL.md"
      - "README.md"
      - "evals/**"
      - "tests/**"
      - "scripts/validate_repo.py"
      - ".github/workflows/skill-eval.yml"

permissions:
  contents: read

concurrency:
  group: skill-eval-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corpus:
    name: Validate eval corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate Agent Skill plugin package
        run: python3 scripts/validate_repo.py
      - name: Test skill behavior and standalone portability
        run: python3 -m unittest discover -s tests -v
      - name: Validate reference fixture
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python3 evals/validate_results.py
          --results evals/fixtures/reference-results.json

  model-eval:
    name: Claude skill contract eval
    needs: corpus
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (vars.ENABLE_CLAUDE_EVALS == 'true' &&
          (github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Select Claude credential
        id: claude_auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "mode=oauth" >> "$GITHUB_OUTPUT"
          elif [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "mode=api" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Set CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY as a repository secret before running model evals."
            exit 1
          fi

      - name: Execute humanize-japanese skill
        id: claude_eval
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ steps.claude_auth.outputs.mode == 'oauth' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          anthropic_api_key: ${{ steps.claude_auth.outputs.mode == 'api' && secrets.ANTHROPIC_API_KEY || '' }}
          github_token: ${{ github.token }}
          prompt: |
            This is a read-only regression eval for the repository's humanize-japanese skill.

            1. Read `skills/humanize-japanese/SKILL.md` and every reference it tells you to read. This is the single canonical skill installed for both Claude Code and Codex.
            2. Read `evals/cases.json`.
            3. Apply the skill independently to every case. Respect each case's context and target register.
            4. Preserve all protected content and modality. Do not invent facts, sources, apologies, emotions, or experiences.
            5. Use only taxonomy IDs that exist in the repository. Report only actual findings. A justified no-op is valid.
            6. For a kept expression listed by the case, add it to `kept` with a concrete contextual reason.
            7. Return one result for every case, in the same order and with the exact case_id.

            Do not edit repository files, run shell commands, access the network, or comment on GitHub.
            Return only the structured result requested by the JSON schema.
          claude_args: |
            --model ${{ inputs.model || 'claude-sonnet-5' }}
            --max-turns 12
            --disallowedTools "Bash,Edit,Write,NotebookEditCell,WebFetch,WebSearch"
            --json-schema '{"type":"object","additionalProperties":false,"required":["results"],"properties":{"results":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["case_id","register","output","grade","findings","kept","self_check"],"properties":{"case_id":{"type":"string"},"register":{"type":"string","enum":["R0","R1","R2","R3","R4"]},"output":{"type":"string"},"grade":{"type":"string","enum":["A","B","C","D"]},"findings":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["id","before","after","reason"],"properties":{"id":{"type":"string"},"before":{"type":"string"},"after":{"type":"string"},"reason":{"type":"string"}}}},"kept":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["text","reason"],"properties":{"text":{"type":"string"},"reason":{"type":"string"}}}},"self_check":{"type":"object","additionalProperties":false,"required":["facts","modality","register","no_invention"],"properties":{"facts":{"type":"boolean"},"modality":{"type":"boolean"},"register":{"type":"boolean"},"no_invention":{"type":"boolean"}}}}}}}}'

      - name: Validate Claude structured output
        env:
          CLAUDE_STRUCTURED_OUTPUT: ${{ steps.claude_eval.outputs.structured_output }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 evals/validate_results.py \
            --results-env CLAUDE_STRUCTURED_OUTPUT \
            --write-results evals/results/claude.json \
            --report evals/results/report.json \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload eval evidence
        if: ${{ always() && hashFiles('evals/results/**') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: humanize-japanese-eval-${{ inputs.model || 'claude-sonnet-5' }}
          path: evals/results/
          if-no-files-found: error
          retention-days: 14
