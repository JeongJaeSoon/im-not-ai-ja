name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python3 scripts/validate_repo.py
      - run: python3 -m unittest discover -s tests -v
      - run: python3 evals/validate_results.py --results evals/fixtures/reference-results.json
